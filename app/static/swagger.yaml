swagger: "2.0"
info:
  title: "Mechanic Shop API"
  description: "REST API for managing Customers, Mechanics, Service Tickets, and Inventory for a mechanic shop. Customers authenticate via JWT to update/delete their own account and view their own service tickets."
  version: "1.0.0"
host: "mechanic-shop-1-8kj2.onrender.com"
schemes:
  - "https"
consumes:
  - "application/json"
produces:
  - "application/json"

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: "Send as: Bearer <token>. Obtain a token from POST /customers/login."

paths:
  # ------------------------------------------------------------------
  # CUSTOMERS
  # ------------------------------------------------------------------
  /customers/:
    post:
      tags:
        - Customers
      summary: "Create a new customer."
      description: "Registers a new customer. The password is hashed before it is stored; the raw password is never returned."
      parameters:
        - in: "body"
          name: "body"
          description: "Information required to create a new customer."
          required: true
          schema:
            $ref: "#/definitions/CustomerPayload"
      responses:
        201:
          description: "Customer created successfully."
          schema:
            $ref: "#/definitions/CustomerResponse"
          examples:
            application/json:
              id: 1
              name: "Jane Doe"
              email: "jane@example.com"
              phone: "555-123-4567"
        400:
          description: "Validation error (missing/invalid fields)."
          schema:
            $ref: "#/definitions/ErrorResponse"

    get:
      tags:
        - Customers
      summary: "Get all customers (paginated)."
      description: "Returns a paginated list of customers. Use query params page and per_page."
      parameters:
        - in: "query"
          name: "page"
          type: "integer"
          required: false
          description: "Page number, defaults to 1."
        - in: "query"
          name: "per_page"
          type: "integer"
          required: false
          description: "Results per page, defaults to 10."
      responses:
        200:
          description: "Customers retrieved successfully."
          schema:
            $ref: "#/definitions/PaginatedCustomersResponse"

  /customers/{id}:
    get:
      tags:
        - Customers
      summary: "Get a single customer by ID."
      description: "Returns one customer's details."
      parameters:
        - in: "path"
          name: "id"
          type: "integer"
          required: true
          description: "ID of the customer to retrieve."
      responses:
        200:
          description: "Customer found."
          schema:
            $ref: "#/definitions/CustomerResponse"
        404:
          description: "Customer not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

    put:
      tags:
        - Customers
      summary: "Update your own customer account."
      description: "Token-authenticated route. A customer may only update their own record; fields not sent are left unchanged."
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "id"
          type: "integer"
          required: true
          description: "ID of the customer to update. Must match the logged-in customer's ID."
        - in: "body"
          name: "body"
          description: "Fields to update (any subset)."
          required: true
          schema:
            $ref: "#/definitions/CustomerUpdatePayload"
      responses:
        200:
          description: "Customer updated successfully."
          schema:
            $ref: "#/definitions/CustomerResponse"
        400:
          description: "Validation error."
          schema:
            $ref: "#/definitions/ErrorResponse"
        403:
          description: "Attempting to update another customer's account."
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Customer not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

    delete:
      tags:
        - Customers
      summary: "Delete your own customer account."
      description: "Token-authenticated route. A customer may only delete their own record."
      security:
        - bearerAuth: []
      parameters:
        - in: "path"
          name: "id"
          type: "integer"
          required: true
          description: "ID of the customer to delete. Must match the logged-in customer's ID."
      responses:
        200:
          description: "Customer deleted successfully."
          schema:
            $ref: "#/definitions/MessageResponse"
          examples:
            application/json:
              message: "Customer 1 deleted"
        403:
          description: "Attempting to delete another customer's account."
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Customer not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

  /customers/login:
    post:
      tags:
        - Customers
      summary: "Log in and receive a JWT."
      description: "Validates customer credentials and returns a signed token used to access protected routes. Rate limited to 5 attempts per minute per IP."
      parameters:
        - in: "body"
          name: "body"
          description: "Login credentials."
          required: true
          schema:
            $ref: "#/definitions/LoginPayload"
      responses:
        200:
          description: "Login successful."
          schema:
            $ref: "#/definitions/LoginResponse"
        400:
          description: "Missing email or password."
          schema:
            $ref: "#/definitions/ErrorResponse"
        401:
          description: "Invalid email or password."
          schema:
            $ref: "#/definitions/ErrorResponse"

  # ------------------------------------------------------------------
  # MECHANICS
  # ------------------------------------------------------------------
  /mechanics/:
    post:
      tags:
        - Mechanics
      summary: "Create a new mechanic."
      description: "Registers a new mechanic."
      parameters:
        - in: "body"
          name: "body"
          description: "Information required to create a new mechanic."
          required: true
          schema:
            $ref: "#/definitions/MechanicPayload"
      responses:
        201:
          description: "Mechanic created successfully."
          schema:
            $ref: "#/definitions/MechanicResponse"
          examples:
            application/json:
              id: 1
              name: "Sam Torres"
              email: "sam@example.com"
              phone: "555-987-6543"
              salary: 55000.0
        400:
          description: "Validation error (missing/invalid fields)."
          schema:
            $ref: "#/definitions/ErrorResponse"

    get:
      tags:
        - Mechanics
      summary: "Get all mechanics."
      description: "Returns every mechanic. Response is cached for 60 seconds."
      responses:
        200:
          description: "Mechanics retrieved successfully."
          schema:
            $ref: "#/definitions/MechanicsResponse"

  /mechanics/{id}:
    put:
      tags:
        - Mechanics
      summary: "Update a mechanic."
      description: "Updates fields on an existing mechanic; fields not sent are left unchanged."
      parameters:
        - in: "path"
          name: "id"
          type: "integer"
          required: true
          description: "ID of the mechanic to update."
        - in: "body"
          name: "body"
          description: "Fields to update (any subset)."
          required: true
          schema:
            $ref: "#/definitions/MechanicUpdatePayload"
      responses:
        200:
          description: "Mechanic updated successfully."
          schema:
            $ref: "#/definitions/MechanicResponse"
        400:
          description: "Validation error."
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Mechanic not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

    delete:
      tags:
        - Mechanics
      summary: "Delete a mechanic."
      description: "Permanently removes a mechanic."
      parameters:
        - in: "path"
          name: "id"
          type: "integer"
          required: true
          description: "ID of the mechanic to delete."
      responses:
        200:
          description: "Mechanic deleted successfully."
          schema:
            $ref: "#/definitions/MessageResponse"
          examples:
            application/json:
              message: "Mechanic 1 deleted"
        404:
          description: "Mechanic not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

  /mechanics/most-tickets:
    get:
      tags:
        - Mechanics
      summary: "Get mechanics ranked by ticket count."
      description: "Returns every mechanic sorted by number of assigned service tickets, busiest first."
      responses:
        200:
          description: "Ranked mechanics retrieved successfully."
          schema:
            $ref: "#/definitions/MechanicsResponse"

  # ------------------------------------------------------------------
  # SERVICE TICKETS
  # ------------------------------------------------------------------
  /service-tickets/:
    post:
      tags:
        - Service Tickets
      summary: "Create a new service ticket."
      description: "Creates a service ticket tied to an existing customer_id."
      parameters:
        - in: "body"
          name: "body"
          description: "Information required to create a new service ticket."
          required: true
          schema:
            $ref: "#/definitions/ServiceTicketPayload"
      responses:
        201:
          description: "Service ticket created successfully."
          schema:
            $ref: "#/definitions/ServiceTicketResponse"
          examples:
            application/json:
              id: 1
              VIN: "1HGCM82633A004352"
              service_date: "2026-07-06"
              service_desc: "Brake pad replacement"
              customer_id: 1
        400:
          description: "Validation error (missing/invalid fields)."
          schema:
            $ref: "#/definitions/ErrorResponse"

    get:
      tags:
        - Service Tickets
      summary: "Get all service tickets."
      description: "Returns every service ticket in the system."
      responses:
        200:
          description: "Service tickets retrieved successfully."
          schema:
            $ref: "#/definitions/ServiceTicketsResponse"

  /service-tickets/{ticket_id}/assign-mechanic/{mechanic_id}:
    put:
      tags:
        - Service Tickets
      summary: "Assign a mechanic to a service ticket."
      description: "Adds the given mechanic to the given ticket's list of assigned mechanics."
      parameters:
        - in: "path"
          name: "ticket_id"
          type: "integer"
          required: true
          description: "ID of the service ticket."
        - in: "path"
          name: "mechanic_id"
          type: "integer"
          required: true
          description: "ID of the mechanic to assign."
      responses:
        200:
          description: "Mechanic assigned successfully."
          schema:
            $ref: "#/definitions/MessageResponse"
          examples:
            application/json:
              message: "Mechanic 2 assigned to ticket 1"
        400:
          description: "Mechanic is already assigned to this ticket."
          schema:
            $ref: "#/definitions/MessageResponse"
        404:
          description: "Service ticket or mechanic not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

  /service-tickets/{ticket_id}/remove-mechanic/{mechanic_id}:
    put:
      tags:
        - Service Tickets
      summary: "Remove a mechanic from a service ticket."
      description: "Removes the given mechanic from the given ticket's list of assigned mechanics."
      parameters:
        - in: "path"
          name: "ticket_id"
          type: "integer"
          required: true
          description: "ID of the service ticket."
        - in: "path"
          name: "mechanic_id"
          type: "integer"
          required: true
          description: "ID of the mechanic to remove."
      responses:
        200:
          description: "Mechanic removed successfully."
          schema:
            $ref: "#/definitions/MessageResponse"
          examples:
            application/json:
              message: "Mechanic 2 removed from ticket 1"
        400:
          description: "Mechanic is not assigned to this ticket."
          schema:
            $ref: "#/definitions/MessageResponse"
        404:
          description: "Service ticket or mechanic not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

  /service-tickets/{ticket_id}/edit:
    put:
      tags:
        - Service Tickets
      summary: "Bulk add/remove mechanics on a ticket."
      description: "Adds and removes several mechanics from a ticket in a single request."
      parameters:
        - in: "path"
          name: "ticket_id"
          type: "integer"
          required: true
          description: "ID of the service ticket to edit."
        - in: "body"
          name: "body"
          description: "Lists of mechanic IDs to add and remove."
          required: true
          schema:
            $ref: "#/definitions/EditTicketMechanicsPayload"
      responses:
        200:
          description: "Ticket mechanics updated successfully."
          schema:
            $ref: "#/definitions/ServiceTicketResponse"
        404:
          description: "Service ticket not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

  /service-tickets/my-tickets:
    get:
      tags:
        - Service Tickets
      summary: "Get the logged-in customer's own service tickets."
      description: "Token-authenticated route. Returns only the tickets belonging to the logged-in customer."
      security:
        - bearerAuth: []
      responses:
        200:
          description: "Service tickets retrieved successfully."
          schema:
            $ref: "#/definitions/ServiceTicketsResponse"
        401:
          description: "Missing, invalid, or expired token."
          schema:
            $ref: "#/definitions/ErrorResponse"

  /service-tickets/{ticket_id}/add-part/{inventory_id}:
    put:
      tags:
        - Service Tickets
      summary: "Add an inventory part to a service ticket."
      description: "Attaches the given inventory part to the given service ticket."
      parameters:
        - in: "path"
          name: "ticket_id"
          type: "integer"
          required: true
          description: "ID of the service ticket."
        - in: "path"
          name: "inventory_id"
          type: "integer"
          required: true
          description: "ID of the inventory part to add."
      responses:
        200:
          description: "Part added successfully."
          schema:
            $ref: "#/definitions/MessageResponse"
          examples:
            application/json:
              message: "Part 1 added to ticket 1"
        400:
          description: "That part is already on this ticket."
          schema:
            $ref: "#/definitions/MessageResponse"
        404:
          description: "Service ticket or inventory part not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

  # ------------------------------------------------------------------
  # INVENTORY
  # ------------------------------------------------------------------
  /inventory/:
    post:
      tags:
        - Inventory
      summary: "Create a new inventory part."
      description: "Adds a new part to inventory."
      parameters:
        - in: "body"
          name: "body"
          description: "Information required to create a new inventory part."
          required: true
          schema:
            $ref: "#/definitions/InventoryPayload"
      responses:
        201:
          description: "Part created successfully."
          schema:
            $ref: "#/definitions/InventoryResponse"
          examples:
            application/json:
              id: 1
              name: "Brake Pad Set"
              price: 45.99
        400:
          description: "Validation error (missing/invalid fields)."
          schema:
            $ref: "#/definitions/ErrorResponse"

    get:
      tags:
        - Inventory
      summary: "Get all inventory parts."
      description: "Returns every part currently in inventory."
      responses:
        200:
          description: "Inventory retrieved successfully."
          schema:
            $ref: "#/definitions/InventoriesResponse"

  /inventory/{id}:
    get:
      tags:
        - Inventory
      summary: "Get a single inventory part by ID."
      description: "Returns one part's details."
      parameters:
        - in: "path"
          name: "id"
          type: "integer"
          required: true
          description: "ID of the part to retrieve."
      responses:
        200:
          description: "Part found."
          schema:
            $ref: "#/definitions/InventoryResponse"
        404:
          description: "Part not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

    put:
      tags:
        - Inventory
      summary: "Update an inventory part."
      description: "Updates fields on an existing part; fields not sent are left unchanged."
      parameters:
        - in: "path"
          name: "id"
          type: "integer"
          required: true
          description: "ID of the part to update."
        - in: "body"
          name: "body"
          description: "Fields to update (any subset)."
          required: true
          schema:
            $ref: "#/definitions/InventoryUpdatePayload"
      responses:
        200:
          description: "Part updated successfully."
          schema:
            $ref: "#/definitions/InventoryResponse"
        400:
          description: "Validation error."
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: "Part not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

    delete:
      tags:
        - Inventory
      summary: "Delete an inventory part."
      description: "Permanently removes a part from inventory."
      parameters:
        - in: "path"
          name: "id"
          type: "integer"
          required: true
          description: "ID of the part to delete."
      responses:
        200:
          description: "Part deleted successfully."
          schema:
            $ref: "#/definitions/MessageResponse"
          examples:
            application/json:
              message: "Part 1 deleted"
        404:
          description: "Part not found."
          schema:
            $ref: "#/definitions/ErrorResponse"

definitions:
  # ---------------- Customers ----------------
  CustomerPayload:
    type: "object"
    properties:
      name:
        type: "string"
      email:
        type: "string"
      phone:
        type: "string"
      password:
        type: "string"
    required:
      - name
      - email
      - password

  CustomerUpdatePayload:
    type: "object"
    properties:
      name:
        type: "string"
      email:
        type: "string"
      phone:
        type: "string"
      password:
        type: "string"

  CustomerResponse:
    type: "object"
    properties:
      id:
        type: "integer"
      name:
        type: "string"
      email:
        type: "string"
      phone:
        type: "string"

  PaginatedCustomersResponse:
    type: "object"
    properties:
      customers:
        type: "array"
        items:
          $ref: "#/definitions/CustomerResponse"
      total:
        type: "integer"
      page:
        type: "integer"
      pages:
        type: "integer"

  LoginPayload:
    type: "object"
    properties:
      email:
        type: "string"
      password:
        type: "string"
    required:
      - email
      - password

  LoginResponse:
    type: "object"
    properties:
      token:
        type: "string"

  # ---------------- Mechanics ----------------
  MechanicPayload:
    type: "object"
    properties:
      name:
        type: "string"
      email:
        type: "string"
      phone:
        type: "string"
      salary:
        type: "number"
    required:
      - name
      - email

  MechanicUpdatePayload:
    type: "object"
    properties:
      name:
        type: "string"
      email:
        type: "string"
      phone:
        type: "string"
      salary:
        type: "number"

  MechanicResponse:
    type: "object"
    properties:
      id:
        type: "integer"
      name:
        type: "string"
      email:
        type: "string"
      phone:
        type: "string"
      salary:
        type: "number"

  MechanicsResponse:
    type: "array"
    items:
      $ref: "#/definitions/MechanicResponse"

  # ---------------- Service Tickets ----------------
  ServiceTicketPayload:
    type: "object"
    properties:
      VIN:
        type: "string"
      service_date:
        type: "string"
      service_desc:
        type: "string"
      customer_id:
        type: "integer"
    required:
      - VIN
      - customer_id

  ServiceTicketResponse:
    type: "object"
    properties:
      id:
        type: "integer"
      VIN:
        type: "string"
      service_date:
        type: "string"
      service_desc:
        type: "string"
      customer_id:
        type: "integer"

  ServiceTicketsResponse:
    type: "array"
    items:
      $ref: "#/definitions/ServiceTicketResponse"

  EditTicketMechanicsPayload:
    type: "object"
    properties:
      add_ids:
        type: "array"
        items:
          type: "integer"
      remove_ids:
        type: "array"
        items:
          type: "integer"

  # ---------------- Inventory ----------------
  InventoryPayload:
    type: "object"
    properties:
      name:
        type: "string"
      price:
        type: "number"
    required:
      - name
      - price

  InventoryUpdatePayload:
    type: "object"
    properties:
      name:
        type: "string"
      price:
        type: "number"

  InventoryResponse:
    type: "object"
    properties:
      id:
        type: "integer"
      name:
        type: "string"
      price:
        type: "number"

  InventoriesResponse:
    type: "array"
    items:
      $ref: "#/definitions/InventoryResponse"

  # ---------------- Shared ----------------
  MessageResponse:
    type: "object"
    properties:
      message:
        type: "string"

  ErrorResponse:
    type: "object"
    description: "Either a single error/message string, or a Marshmallow-style field-to-error-list validation object."
    properties:
      error:
        type: "string"
      message:
        type: "string"
